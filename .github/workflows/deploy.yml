name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # Clone or pull
            if [ ! -d "$HOME/lunor-circle" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/Bash-mocart/lunor-circle.git $HOME/lunor-circle
            fi
            cd $HOME/lunor-circle
            git pull https://${{ secrets.GH_PAT }}@github.com/Bash-mocart/lunor-circle.git main
            docker compose up --build -d
